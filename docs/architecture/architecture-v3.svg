  <text x="60" y="868" font-size="11" fill="#5f6368" font-style="italic">Threat model: docs/THREAT_MODEL.md · Limitations: docs/LIMITATIONS.md · ADR-006 (multi-orchestrator) · ADR-007 (spoliation moat)</text>
