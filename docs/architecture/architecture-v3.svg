    <text x="560" y="262" font-size="12" font-weight="600" fill="#202124">Memory forensics</text>
    <text x="580" y="282" font-size="12" fill="#5f6368">• windows.psscan</text>
    <text x="580" y="300" font-size="12" fill="#5f6368">• windows.netscan</text>
    <text x="580" y="318" font-size="12" fill="#5f6368">• windows.malfind</text>
    <text x="580" y="336" font-size="12" fill="#5f6368">• windows.cmdline</text>

    <text x="560" y="366" font-size="12" font-weight="600" fill="#202124">Disk forensics</text>
    <text x="580" y="386" font-size="12" fill="#5f6368">• mftscan / ADS</text>
    <text x="580" y="404" font-size="12" fill="#5f6368">• registry.printkey · regripper (allowlisted)</text>
    <text x="580" y="422" font-size="12" fill="#5f6368">• filesystem / timeline</text>

    <text x="560" y="452" font-size="12" font-weight="600" fill="#202124">Run-control</text>
    <text x="580" y="472" font-size="12" fill="#5f6368">• file-based cache (5 GB image safe)</text>
    <text x="580" y="490" font-size="12" fill="#5f6368">• JSONL output parser · Pydantic-validated</text>

