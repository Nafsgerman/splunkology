    <text x="80" y="296" font-size="13" fill="#5f6368">Graph state machine · checkpointed nodes</text>
    <text x="80" y="315" font-size="12" font-weight="600" fill="#1a73e8">Claude Sonnet 4.5</text>
  </g>
  <g>
    <rect x="60" y="335" width="420" height="80" rx="8" fill="#ffffff" stroke="#dadce0"/>
