  <text x="1340" y="50" font-size="13" fill="#5f6368" text-anchor="end">SANS FIND EVIL! 2026</text>
  <text x="1340" y="68" font-size="12" fill="#5f6368" text-anchor="end">github.com/Nafsgerman/siftguard</text>

  <text x="60" y="125" font-size="13" font-weight="600" fill="#1a73e8" letter-spacing="1.2">ORCHESTRATION LAYER · variable under test</text>
  <text x="540" y="125" font-size="13" font-weight="600" fill="#1a73e8" letter-spacing="1.2">TYPED TOOL CONTRACT</text>
  <text x="970" y="125" font-size="13" font-weight="600" fill="#1a73e8" letter-spacing="1.2">EVIDENCE + AUDIT · architectural guardrails</text>

  <g>
