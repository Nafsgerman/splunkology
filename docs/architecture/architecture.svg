<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 980" font-family="Roboto, 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#5f6368"/>
    </marker>
    <marker id="arrowblue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#1a73e8"/>
    </marker>
    <marker id="arrowgreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#65a637"/>
    </marker>
    <filter id="card" x="-4%" y="-4%" width="108%" height="116%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#000000" flood-opacity="0.14"/>
    </filter>
  </defs>

  <rect x="0" y="0" width="1280" height="980" fill="#ffffff"/>

  <!-- Title -->
  <text x="48" y="56" font-size="30" font-weight="700" fill="#202124">Splunkology</text>
  <text x="48" y="84" font-size="15" fill="#5f6368">Autonomous Splunk-native SOC triage agent &#8212; system architecture</text>
  <line x1="48" y1="100" x2="1232" y2="100" stroke="#1a73e8" stroke-width="3"/>

  <!-- ============ ROW 1: Browser ============ -->
  <g filter="url(#card)">
    <rect x="440" y="132" width="400" height="78" rx="8" fill="#ffffff" stroke="#dadce0"/>
  </g>
  <rect x="440" y="132" width="400" height="6" rx="3" fill="#1a73e8"/>
  <text x="640" y="166" text-anchor="middle" font-size="16" font-weight="600" fill="#202124">SOC Analyst Browser</text>
  <text x="640" y="190" text-anchor="middle" font-size="12.5" fill="#5f6368">dashboard/index.html &#183; triage view &#183; live SSE feed</text>

  <!-- Browser <-> API arrows -->
  <line x1="600" y1="210" x2="600" y2="248" stroke="#1a73e8" stroke-width="2" marker-end="url(#arrowblue)"/>
  <text x="556" y="234" text-anchor="end" font-size="11" fill="#1a73e8">POST /api/investigate</text>
  <line x1="690" y1="248" x2="690" y2="210" stroke="#65a637" stroke-width="2" marker-end="url(#arrowgreen)"/>
  <text x="724" y="234" font-size="11" fill="#65a637">SSE /api/stream</text>

  <!-- ============ ROW 2: FastAPI layer ============ -->
  <g filter="url(#card)">
    <rect x="320" y="250" width="640" height="118" rx="8" fill="#f8f9fa" stroke="#dadce0"/>
  </g>
  <text x="344" y="278" font-size="15" font-weight="600" fill="#202124">FastAPI Dashboard Service</text>
  <text x="344" y="298" font-size="11.5" fill="#5f6368">dashboard/app.py</text>

  <g font-size="11.5" fill="#202124">
    <rect x="344" y="312" width="138" height="40" rx="5" fill="#ffffff" stroke="#dadce0"/>
    <text x="413" y="330" text-anchor="middle">/api/investigate</text>
    <text x="413" y="345" text-anchor="middle" fill="#5f6368">start run</text>

    <rect x="494" y="312" width="138" height="40" rx="5" fill="#ffffff" stroke="#dadce0"/>
    <text x="563" y="330" text-anchor="middle">/api/stream</text>
    <text x="563" y="345" text-anchor="middle" fill="#5f6368">SSE events</text>

    <rect x="644" y="312" width="138" height="40" rx="5" fill="#ffffff" stroke="#dadce0"/>
    <text x="713" y="330" text-anchor="middle">/api/export</text>
    <text x="713" y="345" text-anchor="middle" fill="#5f6368">pdf / md / txt</text>

    <rect x="794" y="312" width="142" height="40" rx="5" fill="#ffffff" stroke="#dadce0"/>
    <text x="865" y="330" text-anchor="middle">/api/corrections</text>
    <text x="865" y="345" text-anchor="middle" fill="#5f6368">/orchestrator-cmp</text>
  </g>

  <!-- API -> dispatch -->
  <line x1="640" y1="368" x2="640" y2="404" stroke="#5f6368" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="652" y="390" font-size="11" fill="#5f6368">on_event callback streams every step back to UI</text>

  <!-- ============ ROW 3: Orchestrator dispatch ============ -->
  <g filter="url(#card)">
    <rect x="200" y="406" width="880" height="120" rx="8" fill="#ffffff" stroke="#dadce0"/>
  </g>
  <text x="224" y="434" font-size="15" font-weight="600" fill="#202124">Orchestrator Dispatch &#8212; swappable adapters</text>
  <text x="224" y="453" font-size="11.5" fill="#5f6368">selected per-request via the orchestrator field &#183; same tools, same audit schema, one comparison harness</text>

  <g font-size="12">
    <rect x="224" y="466" width="148" height="44" rx="6" fill="#e8f0fe" stroke="#1a73e8" stroke-width="2"/>
    <text x="298" y="484" text-anchor="middle" font-weight="700" fill="#1a73e8">Native Loop</text>
    <text x="298" y="500" text-anchor="middle" font-size="10.5" fill="#1a73e8">loop_v2 (primary)</text>

    <rect x="384" y="466" width="120" height="44" rx="6" fill="#ffffff" stroke="#dadce0"/>
    <text x="444" y="484" text-anchor="middle" fill="#202124">Native / Haiku</text>
    <text x="444" y="500" text-anchor="middle" font-size="10.5" fill="#5f6368">haiku-4.5</text>

    <rect x="516" y="466" width="120" height="44" rx="6" fill="#ffffff" stroke="#dadce0"/>
    <text x="576" y="484" text-anchor="middle" fill="#202124">OpenAI FC</text>
    <text x="576" y="500" text-anchor="middle" font-size="10.5" fill="#5f6368">gpt function-call</text>

    <rect x="648" y="466" width="120" height="44" rx="6" fill="#ffffff" stroke="#dadce0"/>
    <text x="708" y="484" text-anchor="middle" fill="#202124">LangGraph</text>
    <text x="708" y="500" text-anchor="middle" font-size="10.5" fill="#5f6368">graph runtime</text>

    <rect x="780" y="466" width="120" height="44" rx="6" fill="#ffffff" stroke="#dadce0"/>
    <text x="840" y="484" text-anchor="middle" fill="#202124">Gemini</text>
    <text x="840" y="500" text-anchor="middle" font-size="10.5" fill="#5f6368">3 Pro</text>

    <rect x="912" y="466" width="144" height="44" rx="6" fill="#ffffff" stroke="#dadce0"/>
    <text x="984" y="484" text-anchor="middle" fill="#202124">Claude Code</text>
    <text x="984" y="500" text-anchor="middle" font-size="10.5" fill="#5f6368">headless CLI</text>
  </g>

  <!-- dispatch -> agent loop (from Native Loop box) -->
  <line x1="298" y1="510" x2="298" y2="556" stroke="#1a73e8" stroke-width="2" marker-end="url(#arrowblue)"/>

  <!-- ============ ROW 4: Agent loop ============ -->
  <g filter="url(#card)">
    <rect x="120" y="558" width="700" height="168" rx="8" fill="#ffffff" stroke="#1a73e8" stroke-width="1.5"/>
  </g>
  <text x="144" y="586" font-size="15" font-weight="600" fill="#202124">Agent Reasoning Loop</text>
  <text x="144" y="605" font-size="11.5" fill="#5f6368">agent/loop_v2.py &#183; run_case_v2 &#183; max 15 iterations</text>

  <g font-size="11.5">
    <rect x="144" y="618" width="200" height="40" rx="5" fill="#e8f0fe" stroke="#1a73e8"/>
    <text x="244" y="636" text-anchor="middle" fill="#202124" font-weight="600">Anthropic Messages API</text>
    <text x="244" y="650" text-anchor="middle" fill="#5f6368">structured tool use</text>

    <rect x="356" y="618" width="220" height="40" rx="5" fill="#ffffff" stroke="#dadce0"/>
    <text x="466" y="636" text-anchor="middle" fill="#202124">AgentOutput JSON / turn</text>
    <text x="466" y="650" text-anchor="middle" fill="#5f6368">findings &#183; hypotheses &#183; verdict</text>

    <rect x="588" y="618" width="208" height="40" rx="5" fill="#ffffff" stroke="#dadce0"/>
    <text x="692" y="636" text-anchor="middle" fill="#202124">validate &#8594; retry &#8594; v1 fallback</text>
    <text x="692" y="650" text-anchor="middle" fill="#5f6368">output_validator.py</text>

    <rect x="144" y="668" width="652" height="42" rx="5" fill="#f8f9fa" stroke="#dadce0"/>
    <text x="470" y="686" text-anchor="middle" fill="#202124" font-weight="600">IncidentVerdict</text>
    <text x="470" y="700" text-anchor="middle" fill="#5f6368">claim &#183; confidence &#183; mitre_techniques[MitreMapping] &#183; spl_evidence[SplEvidence]</text>
  </g>

  <!-- agent -> tools -->
  <line x1="470" y1="726" x2="470" y2="762" stroke="#5f6368" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="482" y="748" font-size="11" fill="#5f6368">tool calls</text>

  <!-- agent loop -> Splunk-native AI (dashed planned) -->
  <line x1="820" y1="642" x2="912" y2="642" stroke="#9aa0a6" stroke-width="2" stroke-dasharray="6 5" marker-end="url(#arrow)"/>

  <!-- ============ Planned Splunk-native AI (dashed) ============ -->
  <rect x="912" y="600" width="240" height="86" rx="8" fill="#ffffff" stroke="#9aa0a6" stroke-width="1.5" stroke-dasharray="6 5"/>
  <text x="1032" y="626" text-anchor="middle" font-size="13.5" font-weight="600" fill="#5f6368">Splunk-native AI</text>
  <text x="1032" y="646" text-anchor="middle" font-size="11" fill="#9aa0a6">AI Assistant / Hosted Models</text>
  <text x="1032" y="664" text-anchor="middle" font-size="11" fill="#9aa0a6">over REST &#183; planned</text>
  <text x="1032" y="680" text-anchor="middle" font-size="10" fill="#9aa0a6" font-style="italic">thematic-fit roadmap</text>

  <!-- ============ ROW 5: Splunk tools + client ============ -->
  <g filter="url(#card)">
    <rect x="120" y="764" width="700" height="96" rx="8" fill="#ffffff" stroke="#dadce0"/>
  </g>
  <text x="144" y="792" font-size="15" font-weight="600" fill="#202124">Splunk Tool Layer</text>
  <text x="144" y="811" font-size="11.5" fill="#5f6368">splunk/client.py &#183; _RestTransport &#183; env-only basic auth &#183; fail-loud</text>
  <g font-size="11.5" fill="#202124">
    <rect x="144" y="822" width="200" height="30" rx="5" fill="#f1f8e9" stroke="#65a637"/>
    <text x="244" y="841" text-anchor="middle">splunk_search (SPL)</text>
    <rect x="356" y="822" width="200" height="30" rx="5" fill="#f1f8e9" stroke="#65a637"/>
    <text x="456" y="841" text-anchor="middle">splunk_indexes</text>
    <rect x="568" y="822" width="228" height="30" rx="5" fill="#f1f8e9" stroke="#65a637"/>
    <text x="682" y="841" text-anchor="middle">splunk_server_info</text>
  </g>

  <!-- client -> Splunk platform -->
  <line x1="470" y1="860" x2="470" y2="898" stroke="#65a637" stroke-width="2" marker-end="url(#arrowgreen)"/>
  <text x="482" y="884" font-size="11" fill="#65a637">REST /services/search/jobs</text>

  <!-- ============ ROW 6: Splunk platform ============ -->
  <g filter="url(#card)">
    <rect x="120" y="900" width="700" height="62" rx="8" fill="#ffffff" stroke="#65a637" stroke-width="1.5"/>
  </g>
  <rect x="120" y="900" width="6" height="62" rx="3" fill="#65a637"/>
  <text x="470" y="928" text-anchor="middle" font-size="16" font-weight="700" fill="#202124">Splunk Platform</text>
  <text x="470" y="948" text-anchor="middle" font-size="11.5" fill="#5f6368">indexes &#183; SPL search jobs &#183; notable events &#183; BOTS datasets</text>

  <!-- ============ Persistence column (right) ============ -->
  <g filter="url(#card)">
    <rect x="912" y="724" width="240" height="170" rx="8" fill="#f8f9fa" stroke="#dadce0"/>
  </g>
  <text x="936" y="752" font-size="14" font-weight="600" fill="#202124">Tamper-evident Audit</text>
  <text x="936" y="770" font-size="11" fill="#5f6368">audit/log.py &#183; instrumentation.py</text>
  <g font-size="11.5" fill="#202124">
    <rect x="936" y="782" width="192" height="30" rx="5" fill="#ffffff" stroke="#dadce0"/>
    <text x="1032" y="801" text-anchor="middle">append-only audit rows</text>
    <rect x="936" y="818" width="192" height="30" rx="5" fill="#ffffff" stroke="#dadce0"/>
    <text x="1032" y="837" text-anchor="middle">iteration snapshots</text>
    <rect x="936" y="854" width="192" height="30" rx="5" fill="#ffffff" stroke="#dadce0"/>
    <text x="1032" y="873" text-anchor="middle">experiment_run (SQLite)</text>
  </g>

  <!-- loop -> audit -->
  <path d="M796 690 C 860 690, 880 760, 932 786" fill="none" stroke="#5f6368" stroke-width="2" stroke-dasharray="0" marker-end="url(#arrow)"/>
  <text x="846" y="724" font-size="10.5" fill="#5f6368">every step</text>

  <!-- Legend -->
  <g font-size="11" fill="#5f6368">
    <rect x="48" y="132" width="14" height="14" rx="3" fill="#e8f0fe" stroke="#1a73e8"/>
    <text x="68" y="143">AI / orchestration</text>
    <rect x="48" y="154" width="14" height="14" rx="3" fill="#f1f8e9" stroke="#65a637"/>
    <text x="68" y="165">Splunk integration</text>
    <line x1="48" y1="182" x2="62" y2="182" stroke="#9aa0a6" stroke-width="2" stroke-dasharray="5 4"/>
    <text x="68" y="186">planned</text>
  </g>
</svg>
